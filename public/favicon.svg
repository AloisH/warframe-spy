<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Platinum gem">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="85%">
      <stop offset="0" stop-color="#16202c"/>
      <stop offset="1" stop-color="#080a0d"/>
    </radialGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6e2ab"/>
      <stop offset=".5" stop-color="#d8b46a"/>
      <stop offset="1" stop-color="#9c7e3e"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="13" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="11.5" fill="none" stroke="#233040" stroke-width="1"/>

  <!-- faceted gem (the ◈ glyph) -->
  <g stroke="#7a6230" stroke-width="1.3" stroke-linejoin="round">
    <path d="M32 7 55 32 32 57 9 32Z" fill="url(#gem)"/>
    <!-- crown facets -->
    <path d="M32 7 21 22 43 22Z" fill="#f6e2ab" opacity=".55"/>
    <path d="M21 22 9 32 43 22Z M43 22 55 32 21 22Z" fill="#e9cd87" opacity=".4"/>
    <!-- table + pavilion split lines -->
    <path d="M9 32H55 M21 22 32 57 43 22" fill="none"/>
  </g>

  <!-- cyan energy glint -->
  <path d="M32 13 38 21 32 25 26 21Z" fill="#4fd6e6" opacity=".28"/>
</svg>
