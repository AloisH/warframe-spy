name: Build & deploy to GitHub Pages

# Rebuilds data.json with fresh warframe.market prices, then publishes public/.
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *' # refresh prices every 6 hours (UTC)
  workflow_dispatch: {} # allow manual "Run workflow"

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer runs supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build data (fetch drop table + live prices)
        run: node build.mjs

      - uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deploy
        uses: actions/deploy-pages@v4
